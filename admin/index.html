<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST - Admin Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../lucide.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="admin-screen" class="screen">
        <header class="admin-header">
            <h2>FAST Admin Dashboard</h2>
            <button id="logout-btn" class="btn btn-danger">Logout</button>
        </header>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchAdminTab('troubleshoot')">ข้อมูลการแก้ไขปัญหา</button>
            <button class="tab-btn" onclick="switchAdminTab('onu-setup')">ข้อมูลการตั้งค่า onu</button>
            <button class="tab-btn" onclick="switchAdminTab('phonebook')">ข้อมูลสมุดโทรศัพท์</button>
        </div>
        <main id="tab-troubleshoot" class="admin-content">
            <div class="actions-bar">
                <button id="add-new-btn" class="btn btn-primary"><i data-lucide="plus"></i> Add New Scom</button>
            </div>
            
            <div class="table-container">
                <table id="scom-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Group</th>
                            <th>Scoms</th>
                            <th>Symptom</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="scom-tbody">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
        
        <main id="tab-onu-setup" class="admin-content hidden">
            <div class="actions-bar">
                <button id="add-new-onu-btn" class="btn btn-primary"><i data-lucide="plus"></i> Add New ONU Config</button>
            </div>
            <div class="table-container">
                <table id="onu-table">
                    <thead>
                        <tr>
                            <th>Brand</th>
                            <th>Mode</th>
                            <th>Details</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="onu-tbody">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>

        <main id="tab-phonebook" class="admin-content hidden">
            <div class="actions-bar">
                <button onclick="pbAddGroup()" class="btn btn-primary"><i data-lucide="plus"></i> Add New Group (เพิ่มกลุ่มส่วนงาน)</button>
            </div>
            
            <div class="table-container">
                <table id="phonebook-table">
                    <thead>
                        <tr>
                            <th>Group</th>
                            <th>Title (ชื่องาน)</th>
                            <th>Phone</th>
                            <th>Extension</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="phonebook-tbody">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="scom-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Add/Edit Scom</h3>
            <form id="scom-form">
                <input type="hidden" id="scom-id">
                <div class="form-group">
                    <label>ID (เช่น U0001)</label>
                    <input type="text" id="f-id" required>
                </div>
                <div class="form-group">
                    <label>Group</label>
                    <input type="text" id="f-group" required>
                </div>
                <div class="form-group">
                    <label>Scoms (หัวข้อ)</label>
                    <input type="text" id="f-scoms" required>
                </div>
                <div class="form-group">
                    <label>Symptom</label>
                    <input type="text" id="f-symptom">
                </div>
                <div class="form-group">
                    <label>CheckPoint</label>
                    <textarea id="f-checkpoint" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Steps</label>
                    <textarea id="f-steps" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>NormalValue</label>
                    <input type="text" id="f-normalvalue">
                </div>
                <div class="form-group">
                    <label>Equipment</label>
                    <input type="text" id="f-equipment">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Modal for Add/Edit ONU Config -->
    <div id="onu-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="onu-modal-title">Add/Edit ONU Config</h3>
            <form id="onu-form">
                <input type="hidden" id="onu-id">
                <div class="form-group">
                    <label>Brand (ยี่ห้อ)</label>
                    <input type="text" id="o-brand" required>
                </div>
                <div class="form-group">
                    <label>Mode (โหมด)</label>
                    <input type="text" id="o-mode" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                        <label style="margin: 0;">Details (รายละเอียดขั้นตอน)</label>
                        <div style="display: flex; gap: 8px;">
                            <button type="button" class="btn btn-sm" onclick="promptInsertImageUrl()" style="font-size: 12px; padding: 4px 8px; border: 1px solid var(--border-color); background: #f8f9fa; cursor: pointer;">
                                <i data-lucide="link" style="width: 14px; height: 14px; margin-right: 4px; vertical-align: text-bottom;"></i>แนบลิงก์รูป
                            </button>
                            <label class="btn btn-sm" style="font-size: 12px; padding: 4px 8px; border: 1px solid var(--border-color); background: #f8f9fa; cursor: pointer; margin: 0; display: inline-block;">
                                <i data-lucide="upload" style="width: 14px; height: 14px; margin-right: 4px; vertical-align: text-bottom;"></i>อัปโหลดรูปภาพ
                                <input type="file" id="image-upload-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                            </label>
                        </div>
                    </div>
                    <textarea id="o-details" rows="8" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" id="onu-modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
